name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.3)'
        required: true
        default: 'v1.0.3'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    # macos-14 = Apple Silicon (M1) runner — native arm64
    env:
      # Disable electron-builder auto code signing — we do it ourselves
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Package Mac (arm64 + x64) — unsigned
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Ad-hoc codesign all Mac apps
        run: |
          chmod +x scripts/codesign-mac.sh
          for appdir in release/mac*; do
            APP="$appdir/Business Accounting Pro.app"
            if [ -d "$APP" ]; then
              echo "──────────────────────────────────────"
              echo "Signing: $APP"
              bash scripts/codesign-mac.sh "$APP"
              echo ""
            fi
          done

      - name: List packaged directories
        run: find release -name "*.app" -maxdepth 3 -type d 2>/dev/null || echo "No .app found"

      - name: Create DMGs from signed apps (hdiutil)
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"

          # electron-builder dir target outputs to:
          #   release/mac-arm64/ for arm64
          #   release/mac/ for universal or default arch
          #   release/mac-x64/ for x64 (cross-compiled)
          for appdir in release/mac*; do
            APP="$appdir/Business Accounting Pro.app"
            if [ -d "$APP" ]; then
              # Determine arch from directory name
              case "$appdir" in
                *arm64*) ARCH="arm64" ;;
                *x64*)   ARCH="x64" ;;
                *)       ARCH="arm64" ;;  # macos-14 runner is ARM, so default = arm64
              esac

              DMG_NAME="Business-Accounting-Pro-${VERSION}-mac-${ARCH}.dmg"
              echo "Creating $DMG_NAME from $APP..."

              STAGING="/tmp/dmg-staging-${ARCH}"
              rm -rf "$STAGING"
              mkdir -p "$STAGING"
              cp -R "$APP" "$STAGING/"
              ln -s /Applications "$STAGING/Applications"

              hdiutil create -volname "Business Accounting Pro" \
                -srcfolder "$STAGING" \
                -ov -format UDZO \
                "release/$DMG_NAME"

              rm -rf "$STAGING"
              echo "  ✓ Created release/$DMG_NAME"
            fi
          done

      - name: Generate latest-mac.yml update manifest
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Build files array entries for each DMG
          FILES_YAML=""
          PRIMARY_DMG=""
          PRIMARY_SHA=""
          PRIMARY_SIZE=""

          for DMG in release/*.dmg; do
            [ -f "$DMG" ] || continue
            FILENAME=$(basename "$DMG")
            SHA512=$(shasum -a 512 "$DMG" | awk '{print $1}' | xxd -r -p | base64)
            SIZE=$(stat -f%z "$DMG")
            FILES_YAML="${FILES_YAML}  - url: ${FILENAME}\n    sha512: ${SHA512}\n    size: ${SIZE}\n"
            # Use arm64 DMG as primary (or last one found)
            if [[ "$FILENAME" == *arm64* ]] || [ -z "$PRIMARY_DMG" ]; then
              PRIMARY_DMG="$FILENAME"
              PRIMARY_SHA="$SHA512"
              PRIMARY_SIZE="$SIZE"
            fi
          done

          printf "version: %s\nfiles:\n%spath: %s\nsha512: %s\nreleaseDate: '%s'\n" \
            "$VERSION" "$FILES_YAML" "$PRIMARY_DMG" "$PRIMARY_SHA" "$RELEASE_DATE" \
            > release/latest-mac.yml

          echo "Generated latest-mac.yml:"
          cat release/latest-mac.yml

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/latest-mac.yml
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Windows distributables
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.yml
            release/*.yaml
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    env:
      DISPATCH_VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Determine version
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Business Accounting Pro ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/latest-mac.yml
            artifacts/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
