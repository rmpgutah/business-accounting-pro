name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.2)'
        required: true
        default: 'v1.0.2'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    # macos-14 = Apple Silicon (M1) runner — builds arm64 natively
    # Also cross-compiles x64 via electron-builder
    env:
      # Disable electron-builder's auto code signing — we handle it ourselves
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Build Mac distributables (unsigned)
        run: npx electron-builder --mac --publish never

      - name: Ad-hoc codesign all Mac apps
        run: |
          # Sign each .app bundle found in release/mac* directories
          for app in release/mac*/Business\ Accounting\ Pro.app; do
            if [ -d "$app" ]; then
              echo "Signing: $app"
              bash scripts/codesign-mac.sh "$app"
            fi
          done

      - name: Rebuild DMGs after codesigning
        run: |
          # The .app bundles inside release/mac-arm64/ and release/mac-x64/ are now
          # properly signed. Rebuild DMGs from them so the distributed DMG contains
          # the codesigned app.
          npx electron-builder --mac dmg --publish never --prepackaged release/mac-arm64 || true
          npx electron-builder --mac dmg --publish never --prepackaged release/mac-x64 || true

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Windows distributables
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    env:
      DISPATCH_VERSION: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Determine version
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Business Accounting Pro ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/mac/*
            artifacts/windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
