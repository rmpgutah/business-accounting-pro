# ─────────────────────────────────────────────────────────────────────────────
# Business Accounting Pro — Nginx Configuration
# Domain: accounting.rmpgutah.us
#
# This file is a REFERENCE COPY. The canonical version lives on the VPS at:
#   /etc/nginx/sites-available/accounting.rmpgutah.us
#
# setup-vps.sh writes this automatically. Only edit if doing manual changes.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name accounting.rmpgutah.us www.accounting.rmpgutah.us;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name accounting.rmpgutah.us www.accounting.rmpgutah.us;

    # ── SSL (managed by certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/accounting.rmpgutah.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/accounting.rmpgutah.us/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ───────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    root  /var/www/accounting.rmpgutah.us;
    index index.html;

    # ── Landing page ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Release files for electron-updater ────────────
    location /releases/ {
        alias /var/www/accounting.rmpgutah.us/releases/;
        autoindex off;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-store, no-cache";
        types {
            application/octet-stream dmg exe AppImage deb blockmap zip;
            text/yaml                yml yaml;
        }
    }

    # ── Static asset caching ───────────────────────────
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|woff2|woff|ttf|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny dotfiles ──────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # NOTE: /opt/bap-server/.env must be created manually on first deploy.
    # See deploy/setup-vps.sh NEXT STEPS for required env vars.

    # ── Sync server proxy ─────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /portal/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── Gzip ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_vary       on;
}
