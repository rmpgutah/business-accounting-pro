appId: us.rmpgutah.accounting
productName: Business Accounting Pro
copyright: Copyright 2026 RMPG
# electron-updater reads latest-mac.yml / latest.yml from GitHub Releases
publish:
  provider: github
  owner: rmpgutah
  repo: business-accounting-pro
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - package.json
extraResources:
  - from: src/main/database/schema.sql
    to: schema.sql
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**
mac:
  category: public.app-category.finance
  icon: build/icon.icns
  darkModeSupport: true
  # Build dir targets only — we create DMGs manually after codesigning
  target:
    - target: dir
      arch:
        - arm64
        - x64
  # CRITICAL: Set identity to null so electron-builder does NOT sign at all.
  # Our scripts/codesign-mac.sh handles consistent ad-hoc signing after packaging.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: BusinessAccountingPro-${version}-mac-${arch}.${ext}
dmg:
  title: Business Accounting Pro
  artifactName: BusinessAccountingPro-${version}-mac-${arch}.${ext}
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: BusinessAccountingPro-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Business Accounting Pro
  createDesktopShortcut: true
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Finance
