<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="160" fill="none" stroke="#6366f1" stroke-width="4" opacity="0.3"/>
  <!-- Dollar sign -->
  <text x="512" y="580" text-anchor="middle" font-family="SF Pro Display, -apple-system, Helvetica Neue, Arial" font-weight="800" font-size="520" fill="url(#accent)">$</text>
  <!-- Bottom bar -->
  <rect x="280" y="780" width="464" height="8" rx="4" fill="#6366f1" opacity="0.6"/>
  <!-- Top dots -->
  <circle cx="340" cy="200" r="16" fill="#6366f1" opacity="0.4"/>
  <circle cx="400" cy="200" r="16" fill="#6366f1" opacity="0.6"/>
  <circle cx="460" cy="200" r="16" fill="#6366f1" opacity="0.8"/>
</svg>
